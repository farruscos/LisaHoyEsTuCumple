<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio personalizado - Lisa Hoy Es Tu Cumple</title>
    <link rel="stylesheet" href="/style.css?v=4">
</head>
<body>
    <div class="container">
        <header>
            <h1>Lisa Hoy Es Tu Cumple</h1>
            <p>Alguien ha creado este audio personalizado para compartirlo contigo.</p>
        </header>

        <main class="shared-main">
            <section class="preview-section shared-card" aria-labelledby="sharedTitle">
                <h2 id="sharedTitle">Audio personalizado</h2>
                <div id="sharedStatus" class="status-message show loading" role="status" aria-live="polite">
                    Cargando audio...
                </div>
                <div id="sharedAudioContainer" class="audio-container" style="display: none;">
                    <audio id="sharedAudioPlayer" controls>
                        Tu navegador no soporta el reproductor de audio.
                    </audio>
                    <a id="sharedDownloadBtn" href="#" class="btn btn-secondary">Descargar MP3</a>
                </div>
                <div id="sharedShareContainer" class="share-container" style="display: none;">
                    <p class="share-title">Compartir este enlace</p>
                    <div class="share-actions">
                        <button type="button" class="share-btn" id="sharedNativeShareBtn">Compartir</button>
                        <button type="button" class="share-btn" id="sharedCopyShareBtn">Copiar enlace</button>
                        <a class="share-btn" id="sharedWhatsappShareBtn" href="#" target="_blank" rel="noopener">WhatsApp</a>
                        <a class="share-btn" id="sharedXShareBtn" href="#" target="_blank" rel="noopener">X</a>
                        <a class="share-btn" id="sharedFacebookShareBtn" href="#" target="_blank" rel="noopener">Facebook</a>
                    </div>
                    <p class="share-note" id="sharedExpiry"></p>
                </div>
                <a class="btn btn-primary" href="/">Crear otro audio</a>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Audio Customization App</p>
        </footer>
    </div>

    <script src="/share.js?v=4"></script>
</body>
</html>
