<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lisa Hoy Es Tu Cumple - Audio personalizado</title>
    <link rel="stylesheet" href="/style.css?v=4">
</head>
<body>
    <div class="container">
        <header>
            <h1>Lisa Hoy Es Tu Cumple</h1>
            <p>Cambia "Lisa" por el nombre que quieras y genera tu audio personalizado.</p>
        </header>

        <main>
            <section class="form-section" aria-labelledby="formTitle">
                <h2 id="formTitle">Crear audio</h2>
                <form id="customizeForm">
                    <div class="form-group">
                        <label for="customName">Nombre:</label>
                        <input
                            type="text"
                            id="customName"
                            name="customName"
                            placeholder="Por ejemplo: Maria, Juan, Sofia..."
                            required
                            maxlength="30"
                            autocomplete="given-name"
                        >
                    </div>

                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Generar audio personalizado
                    </button>
                </form>

                <div id="statusMessage" class="status-message" role="status" aria-live="polite"></div>
            </section>

            <section class="preview-section" aria-labelledby="previewTitle">
                <h2 id="previewTitle">Tu audio</h2>
                <div id="audioContainer" class="audio-container" style="display: none;">
                    <audio id="audioPlayer" controls>
                        Tu navegador no soporta el reproductor de audio.
                    </audio>
                    <a id="downloadBtn" href="#" download="cumple-personalizado.mp3" class="btn btn-secondary">Descargar MP3</a>
                </div>
                <div id="shareContainer" class="share-container" style="display: none;">
                    <p class="share-title">Compartir este resultado</p>
                    <div class="share-actions">
                        <button type="button" class="share-btn" id="nativeShareBtn">Compartir</button>
                        <button type="button" class="share-btn" id="copyShareBtn">Copiar enlace</button>
                        <a class="share-btn" id="whatsappShareBtn" href="#" target="_blank" rel="noopener">WhatsApp</a>
                        <a class="share-btn" id="xShareBtn" href="#" target="_blank" rel="noopener">X</a>
                        <a class="share-btn" id="facebookShareBtn" href="#" target="_blank" rel="noopener">Facebook</a>
                    </div>
                    <p class="share-note" id="shareExpiry"></p>
                </div>
                <div id="noAudio" class="no-audio">
                    <p>Aquí aparecerá tu audio personalizado.</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Audio Customization App</p>
        </footer>
    </div>

    <script src="/script.js?v=4"></script>
</body>
</html>
